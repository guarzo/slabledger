name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/frontend-ci.yml'
      - '!web/**.md'
      - '!web/README.md'
      - '!web/CHANGELOG.md'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/frontend-ci.yml'
      - '!web/**.md'
      - '!web/README.md'
      - '!web/CHANGELOG.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./web

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npm run typecheck

    - name: Run linter
      run: npm run lint

    - name: Run Unit Tests
      run: npm test

    - name: Build
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: web-dist
        path: web/dist/
        retention-days: 1

    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli@0.15.x

    # Lighthouse CI is expensive, only run on main branch or when requested
    - name: Run Lighthouse CI
      if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'lighthouse')
      run: lhci autorun
      continue-on-error: true
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v7
      if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'lighthouse')
      with:
        name: lighthouse-results
        path: web/.lighthouseci/
        retention-days: 7

  smoke-tests:
    # Fast smoke tests for quick feedback (~30-60 seconds)
    # Tests critical paths only (tagged with @smoke)
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./web

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: web-dist
        path: web/dist/

    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('web/package-lock.json') }}
        restore-keys: ${{ runner.os }}-playwright-chromium-

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Start preview server
      run: |
        npm run preview > preview-server.log 2>&1 &
        echo $! > preview-server.pid
      env:
        CI: true

    - name: Wait for server
      run: npx wait-on http://localhost:4173 --timeout 90000

    - name: Run smoke tests only
      run: npx playwright test --grep @smoke
      timeout-minutes: 5
      env:
        CI: true
        SMOKE_ONLY: true

    - name: Upload smoke test results
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: smoke-test-results
        path: web/playwright-report/
        retention-days: 7

    - name: Cleanup preview server
      if: always()
      run: |
        if [ -f preview-server.pid ]; then
          PID=$(cat preview-server.pid)
          kill -TERM -$PID 2>/dev/null || true
          sleep 2
          kill -KILL -$PID 2>/dev/null || true
          rm -f preview-server.pid
        fi

  playwright:
    # Full E2E test suite (runs only if smoke tests pass)
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./web

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: web-dist
        path: web/dist/

    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('web/package-lock.json') }}
        restore-keys: ${{ runner.os }}-playwright-chromium-

    - name: Install Playwright Chromium (fast)
      run: npx playwright install chromium --with-deps

    - name: Start preview server
      run: |
        npm run preview > preview-server.log 2>&1 &
        echo $! > preview-server.pid
        echo "Preview server started with PID: $(cat preview-server.pid)"
      env:
        CI: true

    - name: Wait for server
      run: npx wait-on http://localhost:4173 --timeout 90000

    - name: Run Playwright tests
      run: npx playwright test
      timeout-minutes: 15
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report
        path: web/playwright-report/
        retention-days: 7

    - name: Upload test videos
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: playwright-videos
        path: web/test-results/
        retention-days: 7

    - name: Cleanup preview server
      if: always()
      run: |
        if [ -f preview-server.pid ]; then
          PID=$(cat preview-server.pid)
          echo "Stopping preview server (PID: $PID)"
          kill -TERM -$PID 2>/dev/null || true
          sleep 2
          kill -KILL -$PID 2>/dev/null || true
          rm -f preview-server.pid
          echo "Preview server cleanup complete"
        else
          echo "No PID file found, server may not have started"
        fi

    - name: Upload preview server logs
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: preview-server-logs
        path: web/preview-server.log
        retention-days: 7
