# LEGACY — wanderer-only compose file, kept as emergency rollback for the
# pre-Fly deployment. Production runs on Fly.io since 2026-04-20 and is
# managed via `flyctl deploy` (see fly.toml and .github/workflows/fly-deploy.yml).
# Do not modify for current development. Reaches for DATABASE_PATH (SQLite),
# which the app no longer supports — would require reverting code to a pre-
# cutover commit to be functional.

services:
  slabledger:
    image: ${DOCKERHUB_USERNAME:-guarzo}/slabledger:${VERSION:-latest}
    container_name: slabledger
    ports:
      - "${PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      # Override specific settings for production
      DATABASE_PATH: /app/data/slabledger.db
      LOG_JSON: "true"
      PORT: 8081

    volumes:
      # Persistent data storage
      - ./data:/app/data
      # Cache storage
      - ./cache:/app/cache

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    networks:
      - app_network

    # Resource limits (adjust based on your server capacity)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  render-service:
    image: ${DOCKERHUB_USERNAME:-guarzo}/slabledger-render:${VERSION:-latest}
    container_name: slabledger-render
    environment:
      PORT: 3001
      API_BASE_URL: "http://slabledger:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - app_network
    profiles:
      - social

networks:
  app_network:
    driver: bridge
