
services:
  slabledger:
    image: ${DOCKERHUB_USERNAME:-guarzo}/slabledger:${VERSION:-latest}
    container_name: slabledger
    ports:
      - "${PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      # Override specific settings for production
      DATABASE_PATH: /app/data/slabledger.db
      LOG_JSON: "true"
      PORT: 8081

    volumes:
      # Persistent data storage
      - ./data:/app/data
      # Cache storage
      - ./cache:/app/cache

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    networks:
      - app_network

    # Resource limits (adjust based on your server capacity)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  app_network:
    driver: bridge
