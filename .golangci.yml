version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - revive
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - paramTypeCombine
        - whyNoLint
        - unnamedResult
        - httpNoBody
        - octalLiteral
        - ifElseChain
        - elseif
        - emptyStringTest
        - returnAfterHttpError
        - commentedOutCode
    revive:
      rules:
        - name: exported
          disabled: true
        - name: unexported-return
          disabled: true
  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
      - path: _test\.go
        # The "if x == nil { t.Fatalf(...) }; x.Deref" pattern is safe — Fatalf
        # calls FailNow → runtime.Goexit — but newer staticcheck versions don't
        # model that as terminating, so SA5011 fires across our test suite.
        text: "SA5011"
      - path: testutil/mocks/
        linters:
          - unused
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
