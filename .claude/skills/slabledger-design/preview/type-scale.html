<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; }
  .row { display:flex; align-items:baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .row:last-child { border-bottom:0; }
  .tag { font-size: 10px; color: var(--text-subtle); font-family: var(--font-mono); width: 60px; flex-shrink:0; }
  .spec { color: var(--color-heading); flex: 1; }
  .px { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); margin-left: auto; }
</style>
</head>
<body>
  <div class="row"><div class="tag">4xl</div><div class="spec" style="font-size: 2.25rem; font-weight:800; letter-spacing:-0.02em;">+18.4%</div><div class="px">36 / 800</div></div>
  <div class="row"><div class="tag">3xl</div><div class="spec" style="font-size: 1.875rem; font-weight:700;">Campaigns</div><div class="px">30 / 700</div></div>
  <div class="row"><div class="tag">2xl</div><div class="spec" style="font-size: 1.5rem; font-weight:600;">Weekly Review</div><div class="px">24 / 600</div></div>
  <div class="row"><div class="tag">xl</div><div class="spec" style="font-size: 1.25rem; font-weight:600;">Invoice Readiness</div><div class="px">20 / 600</div></div>
  <div class="row"><div class="tag">lg</div><div class="spec" style="font-size: 1.125rem; font-weight:600;">Card Details</div><div class="px">18 / 600</div></div>
  <div class="row"><div class="tag">base</div><div class="spec" style="font-size: 1rem;">Body paragraph, default copy</div><div class="px">16 / 400</div></div>
  <div class="row"><div class="tag">sm</div><div class="spec" style="font-size: 0.875rem;">UI default · form fields, table rows</div><div class="px">14 / 400</div></div>
  <div class="row"><div class="tag">xs</div><div class="spec" style="font-size: 0.75rem; color: var(--text-muted);">Helper text, micro copy</div><div class="px">12 / 400</div></div>
  <div class="row"><div class="tag">2xs</div><div class="spec" style="font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight:600;">REALIZED ROI</div><div class="px">10 / 600</div></div>
</body>
</html>
