<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radius + shadow</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; }
  .section { margin-bottom: 16px; }
  .label { font-size:10px; text-transform:uppercase; letter-spacing: .08em; color:var(--text-muted); margin-bottom:10px; font-weight:600; }
  .row { display:flex; gap: 14px; align-items:flex-end; }
  .tile { background: var(--surface-2); border: 1px solid var(--surface-0); width: 90px; height: 64px; display:flex; align-items:flex-end; padding: 6px 8px; }
  .tag { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Corner radius</div>
    <div class="row">
      <div class="tile" style="border-radius: 10px"><div class="tag">sm 10</div></div>
      <div class="tile" style="border-radius: 14px"><div class="tag">md 14</div></div>
      <div class="tile" style="border-radius: 18px"><div class="tag">lg 18</div></div>
      <div class="tile" style="border-radius: 22px"><div class="tag">xl 22</div></div>
      <div class="tile" style="border-radius: 9999px"><div class="tag">full</div></div>
    </div>
  </div>
  <div class="section">
    <div class="label">Elevation shadows</div>
    <div class="row">
      <div class="tile" style="border-radius:14px"><div class="tag">—</div></div>
      <div class="tile" style="border-radius:14px; box-shadow:0 6px 16px rgba(0,0,0,.24)"><div class="tag">shadow-1</div></div>
      <div class="tile" style="border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.35)"><div class="tag">shadow-2</div></div>
      <div class="tile" style="border-radius:14px; box-shadow:0 20px 40px rgba(0,0,0,.45)"><div class="tag">shadow-3</div></div>
      <div class="tile" style="border-radius:14px; box-shadow:0 0 20px rgba(99,102,241,.4)"><div class="tag">glow-brand</div></div>
      <div class="tile" style="border-radius:14px; box-shadow:0 0 20px rgba(255,215,0,.5)"><div class="tag">glow-gold</div></div>
    </div>
  </div>
</body>
</html>
