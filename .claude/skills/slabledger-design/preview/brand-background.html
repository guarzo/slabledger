<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Background</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:0; min-height: 240px; position: relative; overflow:hidden; }
  .label { position:absolute; left:20px; bottom: 20px; z-index:2; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color: var(--text-muted); font-weight:600; }
  .orb { position:absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5; pointer-events: none; }
  .o1 { width:280px; height:280px; background: linear-gradient(135deg,#5a5de8,#818cf8); top:-60px; right:-60px; }
  .o2 { width:220px; height:220px; background: linear-gradient(135deg,#10b981,#06b6d4); bottom:-40px; left:-40px; }
</style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="label">page background · radial gradients + animated orbs (login only)</div>
</body>
</html>
