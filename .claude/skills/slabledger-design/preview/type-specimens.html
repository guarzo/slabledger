<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type specimens</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .block { display:flex; flex-direction: column; gap: 4px; }
  .meta { font-size: 10px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-mono); }
  .numbers { font-variant-numeric: tabular-nums; color: var(--color-heading); font-weight: 800; font-size: 32px; letter-spacing: -0.02em; }
  .mono { font-family: var(--font-mono); color: var(--text-muted); font-size: 13px; }
  .upper { text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand-400); font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
  <div class="stack">
    <div class="block">
      <div class="meta">Hero metric · tabular numerals · ext.bold -0.02em</div>
      <div class="numbers">+18.4% <span style="color:#f87171">−12.4%</span> <span style="color:#34d399">$62,480</span></div>
    </div>
    <div class="block">
      <div class="meta">Signature upper-micro label</div>
      <div class="upper">REALIZED ROI · WKS TO COVER · OUTSTANDING</div>
    </div>
    <div class="block">
      <div class="meta">Mono · cert numbers + code</div>
      <div class="mono">PSA #97823041 · 151-CHAR-EX · base-set-charizard-1st</div>
    </div>
  </div>
</body>
</html>
