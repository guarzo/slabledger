# Fly config for the PSA token-harvester job (a SEPARATE Fly app from `slabledger`).
#
# This app builds the Playwright/Chromium image (Dockerfile.harvest) and runs the
# psa-harvest binary to completion — it logs into the PSA portal, writes a fresh
# encrypted access token to the shared Postgres, and exits. It has no HTTP service.
#
# It is NOT a long-running server: the actual run cadence comes from a *scheduled
# machine* created with `fly machine run --schedule hourly` (see docs/psa-harvester.md).
# A plain `fly deploy` here just builds/pushes the image and updates secrets; the
# scheduled machine is what fires it every hour.

app = 'slabledger-psa-harvest'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.harvest'

[[vm]]
  # Chromium needs more headroom than the app; 1GB is comfortable for one login.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
